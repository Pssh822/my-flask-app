<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification | FitHub</title>

    <style>
        body {
            font-family: "Poppins", sans-serif;
            margin: 0;
            background: #f2f4f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .verify-box {
            background: #ffffff;
            width: 400px;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 4px 18px rgba(0,0,0,0.12);
            text-align: center;
        }

        h2 {
            margin-bottom: 5px;
            color: #333;
        }

        p {
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 85%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: 0.2s;
        }

        input[type="text"]:focus {
            border-color: #007bff;
        }

        button {
            width: 90%;
            padding: 12px;
            margin-top: 15px;
            background: #007bff;
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #005fcc;
        }

        .flash-error {
            color: #d93025;
            font-size: 14px;
            margin-top: 10px;
        }

        .resend {
            margin-top: 15px;
            font-size: 14px;
        }
        .resend a {
            color: #007bff;
            text-decoration: none;
        }
        .resend a:hover {
            text-decoration: underline;
        }
    </style>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>

    <div class="verify-box">
        <h2>Email Verification</h2>
        <p>Enter the 6-digit code sent to your email.</p>

        <form method="POST">
            <input type="text" name="otp" placeholder="Enter OTP" maxlength="6" required>
            <button type="submit">Verify</button>
        </form>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for msg in messages %}
              <p class="flash-error">{{ msg }}</p>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <div class="resend">
            Didn’t receive the code? <a href="{{ url_for('resend') }}">Resend</a>
        </div>
    </div>

</body>
</html>
