<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Driver Dashboard</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='driver_settings.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo_fithub.png') }}">
</head>
<body>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">
      <img src="{{ url_for('static', filename='logo_fithub.png') }}" alt="Logo">
      <h2>FitHubExpress</h2>
    </div>
    <nav>
      <ul>
        <li><a href="{{ url_for('driver_dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('driver_deliveries') }}">My Deliveries</a></li>
        <li><a href="{{ url_for('driver_earnings') }}">Earnings</a></li>
        <li><a href="{{ url_for('driver_performance') }}">Performance</a></li>
        <li><a href="{{ url_for('driver_messages') }}">Messages</a></li>
        <li class="active"><a href="{{ url_for('driver_settings') }}">Settings</a></li>
        <li><a href="{{ url_for('logout_seller') }}">Logout</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <!-- Main Content -->
  <main class="main-content">
    <header class="topbar">
      <div class="page-title">Account Settings</div>
      <div class="profile">
        <img src="static/images/profile_icon.png" alt="Driver Profile">
        <span>Driver Name:</span><span class="user-email">{{ session['first_name'] }}</span>
      </div>
    </header>

    <section class="settings-section">
      <!-- Profile Settings -->
      <div class="settings-card">
        <h2>Profile Information</h2>
        <form>
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" placeholder="johndoe@example.com">
          </div>
          <div class="form-group">
            <label>Contact Number</label>
            <input type="text" placeholder="+63 912 345 6789">
          </div>
          <div class="form-group">
            <label>Vehicle Type</label>
            <select>
              <option>Motorcycle</option>
              <option>Car</option>
              <option>Van</option>
            </select>
          </div>
          <button type="submit" class="save-btn">Save Changes</button>
        </form>
      </div>

      <!-- Password Settings -->
      <div class="settings-card">
        <h2>Change Password</h2>
        <form>
          <div class="form-group">
            <label>Current Password</label>
            <input type="password" placeholder="Enter current password">
          </div>
          <div class="form-group">
            <label>New Password</label>
            <input type="password" placeholder="Enter new password">
          </div>
          <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm new password">
          </div>
          <button type="submit" class="save-btn">Update Password</button>
        </form>
      </div>

      <!-- Notification Settings -->
      <div class="settings-card">
        <h2>Notifications</h2>
        <div class="toggle-group">
          <label>
            <input type="checkbox" checked>
            <span>Receive Delivery Updates</span>
          </label>
          <label>
            <input type="checkbox">
            <span>App Updates & Promotions</span>
          </label>
        </div>
      </div>

      <!-- Dark Mode -->
      <div class="settings-card">
        <h2>Appearance</h2>
        <div class="toggle-group">
          <label>
            <input type="checkbox" id="darkModeToggle">
            <span>Enable Dark Mode</span>
          </label>
        </div>
      </div>
    </section>
  </main>

  <script>
    // Optional Dark Mode Toggle
    const toggle = document.getElementById('darkModeToggle');
    toggle?.addEventListener('change', () => {
      document.body.classList.toggle('dark-mode');
    });
  </script>
</body>
</html>
