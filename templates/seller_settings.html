<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seller Settings | FitHub</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='seller_settings.css') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo_fithub.png') }}">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <div class="dashboard">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <img src="{{ url_for('static', filename='logo_fithub.png') }}" alt="Logo">
          <h2>Seller Panel</h2>
        </div>
      </div>

      <ul class="sidebar-menu">
        <li><a href="{{ url_for('seller_dashboard') }}">Dashboard</a></li>
        <li><a href="{{ url_for('seller_products') }}">My Products</a></li>
        <li><a href="{{ url_for('seller_orders') }}">Orders</a></li>
        <li><a href="{{ url_for('seller_earnings') }}">Earnings</a></li>
        <li><a href="{{ url_for('seller_messages') }}">Messages</a></li>
        <li class="active"><a href="{{ url_for('seller_settings') }}">Settings</a></li>
        <li class="logout"><a href="{{ url_for('logout_seller') }}">Logout</a></li>
      </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">

      <header class="topbar">
        <h1>Account Settings</h1>
        <div class="seller-profile">
          <img src="{{ session.get('store_logo', url_for('static', filename='uploads/sellers/default-user.jpg')) }}" alt="Profile">
          <span>Seller Account: </span><span class="user-email">{{ session['first_name'] }}</span>
        </div>
      </header>

      <div class="settings-container">
        
        <!-- Profile Section -->
        <div class="settings-section">
          <h3>Profile Information</h3>

          <label>Store Name</label>
          <input type="text" placeholder="Enter your store name" value="My Fitness Shop">

          <label>Email Address</label>
          <input type="email" placeholder="your@email.com">

          <label>Phone Number</label>
          <input type="text" placeholder="09XXXXXXXXX">
        </div>

        <!-- Security Section -->
        <div class="settings-section">
          <h3>Security</h3>

          <label>Current Password</label>
          <input type="password" placeholder="Enter current password">

          <label>New Password</label>
          <input type="password" placeholder="Enter new password">

          <label>Confirm New Password</label>
          <input type="password" placeholder="Re-enter new password">
        </div>

        <!-- Save Button -->
        <button class="save-btn">Save Changes</button>

        <!-- Danger Zone -->
        <div class="danger-zone">
          <h3 style="color:#b8222f;">Danger Zone</h3>
          <p style="margin-bottom:10px;">Deleting your account is permanent and cannot be undone.</p>
          <button class="delete-btn">Delete My Seller Account</button>
        </div>

      </div>

    </main>

  </div>

</body>
</html>
